];let currentCategory="全部";const grid=document.getElementById("notesGrid"),searchInput=document.getElementById("searchInput"),empty=document.getElementById("emptyMessage");function renderNotes(){const kw=searchInput.value.trim().toLowerCase();const filtered=notes.filter(n=>n.status==="published"&&(currentCategory==="全部"||n.category===currentCategory)&&`${n.ep} ${n.title} ${n.topic} ${n.category} ${n.summary} ${n.points.join(" ")}`.toLowerCase().includes(kw));grid.innerHTML=filtered.map(n=>`<article class="note-card ${n.style}"><div class="note-icon">${n.icon}</div><span class="ep-badge">${n.ep}</span><h2>${n.title}</h2><p>${n.topic}</p><p>${n.summary}</p><ul class="note-list">${n.points.map(p=>`<li>${p}</li>`).join("")}</ul><p><strong>小任務：</strong>${n.activity}</p><a href="${n.link}" class="read-btn">📖 閱讀漫畫</a></article>`).join("");empty.style.display=filtered.length?"none":"block";document.getElementById("notesCount").textContent=`${notes.filter(n=>n.status==="published").length}集`;}searchInput.addEventListener("input",renderNotes);document.querySelectorAll(".filter-btn").forEach(b=>b.addEventListener("click",()=>{document.querySelectorAll(".filter-btn").forEach(x=>x.classList.remove("active"));b.classList.add("active");currentCategory=b.dataset.category;renderNotes();}));renderNotes();</script></body></html>
